# .github/workflows/feedback-collection.yml
# Generated by engagement-harness ci templates --platform github
name: Collect Feedback from Reactions

on:
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday midnight UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

jobs:
  collect:
    name: Collect Feedback
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install engagement-harness
        run: npm install -g engagement-harness

      - name: Collect feedback from reactions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          engagement-harness feedback collect \
            --repo ${{ github.repository }} \
            --since 7days

      - name: Commit updated feedback metrics
        run: |
          git config user.name "Engagement Harness Bot"
          git config user.email "bot@engagement-harness"
          git add .engagement-harness/feedback/ 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: update feedback metrics from reactions"
          git push origin HEAD
